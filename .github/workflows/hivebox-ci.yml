name: hivebox-ci

on:
  push: # on pushing to phases' branches
    branches-ignore:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hivebox-build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 1: Linting 
      - name: Lint Dockerfile
        run: docker run --rm -i hadolint/hadolint < Dockerfile

      - name: Lint Python source
        run: docker run --rm -v $(pwd):/app cytopia/pylint pylint /app/src/*.py --fail-under=7.0
      # Step 2: Build
      - name: building the docker image for hivebox
        run: ./build.sh
      
      # Step 3: (Unit) Testing
      - name: Unit Testing
        run: docker run --rm hivebox:latest pytest src/
