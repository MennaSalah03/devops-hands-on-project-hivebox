name: hivebox-ci

on:
  push:
    branches-ignore:
      - main
    tags:
      - 'v*'
  pull_request: 
    branches:  
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hivebox-build-and-test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Linting 
      - name: Lint Dockerfile
        run: docker run --rm -i hadolint/hadolint < Dockerfile

      - name: Lint Python source
        run: docker run --rm -v $(pwd):/app cytopia/pylint pylint /app/src/*.py --fail-under=7.0
        # Step 2: Build
        # Build and beyond only happens in case of the latest commit having a tag
      - name: building the docker image for hivebox
        id: build
        run: ./build.sh
      
      # Step 3: (Unit) Testing
      # Only runs if the build runs successfully
      - name: Unit Testing
        if: steps.build.outputs.built == 'true'
        run: docker run --rm hivebox:latest pytest src/
